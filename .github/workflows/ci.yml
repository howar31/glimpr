name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mac:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i 'xcode' || true
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build macos --debug
      - name: macOS native tests (RunnerTests)
        run: |
          cd macos
          xcodebuild test -workspace Runner.xcworkspace -scheme Runner \
            -configuration Debug -destination 'platform=macOS'

  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test
      - run: flutter build windows --debug
      - name: Windows native tests (glimpr_tests)
        shell: cmd
        run: |
          cmake --build build\windows\x64 --target glimpr_tests --config Debug
          build\windows\x64\test\Debug\glimpr_tests.exe
